name: Template Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  template-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight required template assets
        run: ./scripts/template_preflight.sh

      - name: Fail on unresolved tokens in non-template files
        run: ./scripts/check-unresolved-template-tokens.sh
